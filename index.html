<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有云转晴 - 个人主页</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 亮色主题 */
        body.light-mode {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
        }
        
        .light-mode .name {
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .light-mode body::before {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 122, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(88, 86, 214, 0.08) 0%, transparent 50%);
        }
        
        .light-mode .intro,
        .light-mode .contact,
        .light-mode .hero-card {
            border-color: rgba(0, 0, 0, 0.08);
            background: #fff;
        }
        
        .light-mode .intro-content,
        .light-mode .hero-card-content {
            background: rgba(0, 0, 0, 0.03);
        }
        
        .light-mode .social-card {
            border-color: rgba(0, 0, 0, 0.08);
            background: #fff;
        }
        
        .light-mode .footer {
            color: #86868b;
        }
        
        .light-mode .navbar {
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        /* 当前时间显示 */
        .current-time {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            opacity: 0.8;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 滚动公告 -->
    <div class="announcement">
        <span class="announcement-label">📢 公告：</span>
        <div class="announcement-content">
            <span>欢迎访问我的个人主页！VPS推荐页面已上线，RackNerd新年优惠低至$11.29/年！</span>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">有云转晴</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">🏠 主页</a></li>
                <li><a href="about.html" class="nav-link">👤 关于</a></li>
                <li><a href="vps.html" class="nav-link">🖥️ VPS</a></li>
                <li><a href="social.html" class="nav-link">📱 社交</a></li>
                <li><a href="contact.html" class="nav-link">📬 联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" title="切换明暗主题">
        <i class="fa-solid fa-moon"></i>
    </button>
    
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="current-time" id="currentTime"></div>
            <div class="avatar">
                <img src="images/avatar.png" alt="头像" id="avatar-img">
            </div>
            <h1 class="name">有云转晴</h1>
            <p class="bio">大家好！热爱技术，喜欢折腾</p>
            <p class="desc">云计算 | 数码科技 | Linux服务器 | 开源项目 | AI工具</p>
            <p class="website">🌐 www.ywsj365.com</p>
        </header>

        <!-- 快速导航卡片 -->
        <section class="quick-links">
            <a href="about.html" class="quick-card">
                <i class="fa-solid fa-user"></i>
                <span>了解更多</span>
            </a>
            <a href="social.html" class="quick-card">
                <i class="fa-solid fa-share-nodes"></i>
                <span>关注我</span>
            </a>
            <a href="contact.html" class="quick-card">
                <i class="fa-solid fa-comments"></i>
                <span>联系我</span>
            </a>
        </section>

        <!-- 最新视频预览 -->
        <section class="latest-video">
            <h2>🎬 最新视频</h2>
            <div id="video-container">
                <div class="video-card loading">
                    <p>正在加载最新视频...</p>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2026 有云转晴. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Shanghai'
            };
            const timeStr = now.toLocaleString('zh-CN', options);
            document.getElementById('currentTime').textContent = timeStr;
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        function detectSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        
        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme(isDayTime() ? 'light' : 'dark');
            }
        }
        
        function setTheme(theme) {
            if (theme === 'light') {
                body.classList.add('light-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                body.classList.remove('light-mode');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
            localStorage.setItem('theme', theme);
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.classList.contains('light-mode') ? 'light' : 'dark';
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
        
        initTheme();
        
        // 自动获取B站最新视频
        const UID = '519573454';
        
        async function fetchLatestVideo() {
            try {
                // 使用代理服务解决CORS问题
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const apiUrl = encodeURIComponent(`https://api.bilibili.com/x/space/arc/search?mid=${UID}&ps=1&pn=1`);
                
                const response = await fetch(proxyUrl + apiUrl);
                const data = await response.json();
                
                if (data.data && data.data.list && data.data.list.vlist && data.data.list.vlist.length > 0) {
                    const video = data.data.list.vlist[0];
                    const videoContainer = document.getElementById('video-container');
                    
                    videoContainer.innerHTML = `
                        <div class="video-card">
                            <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:15px;">
                                <iframe src="https://player.bilibili.com/player.html?bvid=${video.bvid}&page=1&high_quality=1" 
                                    scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"
                                    style="position:absolute;top:0;left:0;width:100%;height:100%;">
                                </iframe>
                            </div>
                            <h3>${video.title}</h3>
                            <p>📺 ${(video.play / 10000).toFixed(1)}万播放 · 💬 ${video.video_review}弹幕 · 👍 ${video.like}</p>
                            <a href="https://www.bilibili.com/video/${video.bvid}" target="_blank" class="video-link">在B站打开 →</a>
                        </div>
                    `;
                } else {
                    showDefaultVideo();
                }
            } catch (error) {
                console.error('获取视频失败:', error);
                showDefaultVideo();
            }
        }
        
        function showDefaultVideo() {
            document.getElementById('video-container').innerHTML = `
                <div class="video-card">
                    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:15px;">
                        <iframe src="https://player.bilibili.com/player.html?bvid=BV1r8PjzrE1Y&page=1&high_quality=1" 
                            scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"
                            style="position:absolute;top:0;left:0;width:100%;height:100%;">
                        </iframe>
                    </div>
                    <h3>OpenClaw中文版Windows部署教程</h3>
                    <p>2000万Tokens免费领 · 对接飞书 · 国内网络环境优化</p>
                    <a href="https://www.bilibili.com/video/BV1r8PjzrE1Y" target="_blank" class="video-link">在B站打开 →</a>
                    <p style="font-size:12px;color:#888;margin-top:8px;">(自动获取失败，显示默认视频)</p>
                </div>
            `;
        }
        
        // 页面加载完成后获取视频
        fetchLatestVideo();
    </script>
</body>
</html>
